<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Etiquetas ZPL 10x15</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      background: #f0f2f5;
    }
    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }
    .container {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      max-width: 1200px;
      margin: auto;
    }
    .form-panel {
      flex: 1;
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      min-width: 0;
    }
    .preview-panel {
      width: 340px;
      flex-shrink: 0;
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      position: sticky;
      top: 20px;
    }
    .preview-panel h3 {
      margin: 0 0 12px 0;
      color: #444;
      font-size: 15px;
      text-align: center;
    }
    #previewImg {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fafafa;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #previewImg img {
      width: 100%;
      display: block;
    }
    #previewPlaceholder {
      color: #aaa;
      font-size: 13px;
      text-align: center;
      padding: 40px 10px;
    }
    #previewStatus {
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-top: 8px;
      min-height: 18px;
    }
    label {
      font-weight: bold;
      margin-top: 12px;
      display: block;
      font-size: 13px;
      color: #555;
    }
    input, textarea, select {
      width: 100%;
      margin-top: 4px;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #4a90e2;
    }
    textarea {
      font-family: monospace;
      height: 110px;
      resize: vertical;
    }
    .row2 {
      display: flex;
      gap: 12px;
    }
    .row2 > div { flex: 1; }
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .button-group button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
      min-width: 120px;
    }
    .btn-gerar    { background: #4a90e2; color: #fff; }
    .btn-gerar:hover { background: #357abd; }
    .btn-copiar   { background: #6c757d; color: #fff; }
    .btn-copiar:hover { background: #545b62; }
    .btn-download { background: #28a745; color: #fff; }
    .btn-download:hover { background: #1e7e34; }
    .btn-preview  { background: #fd7e14; color: #fff; }
    .btn-preview:hover { background: #e06b00; }
    #saidaZPL {
      height: 180px;
      font-size: 12px;
      background: #f8f9fa;
    }
    .section-title {
      font-size: 12px;
      font-weight: bold;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 18px;
      margin-bottom: 2px;
      border-bottom: 1px solid #eee;
      padding-bottom: 4px;
    }
  </style>
</head>
<body>
  <h2>🎯 Gerador de Etiquetas ZPL (10×15 cm)</h2>

  <div class="container">
    <!-- FORMULÁRIO -->
    <div class="form-panel">

      <div class="section-title">📦 Produto</div>

      <label>Nome do Produto</label>
      <input type="text" id="nomeProduto" placeholder="Ex: Papel Toalha Interfolha 2 Dobra FD Ipel Trends" />

      <div class="row2">
        <div>
          <label>Tamanho da Fonte do Título</label>
          <input type="number" id="tamanhoFonteTitulo" value="45" />
        </div>
        <div>
          <label>Posição Y do Título</label>
          <input type="number" id="posicaoYTitulo" value="40" />
        </div>
      </div>

      <label>Nome da Linha / Kit</label>
      <input type="text" id="nomeLinha" placeholder="Ex: kit 1000 folhas" />

      <label>EAN (código de barras)</label>
      <input type="text" id="codigoEAN" placeholder="Ex: 7899853805084" />

      <div class="section-title">📋 Descrição Técnica</div>

      <label>Descrição Técnica (1 item por linha, máx. 5 linhas)</label>
      <textarea id="descricaoTecnica" placeholder="2 dobras
Folha Dupla
Ipel Trends
22,5cm x 20,5cm
Gramatura: 28g"></textarea>

      <div class="section-title">🏭 Fabricante</div>

      <label>Fabricante</label>
      <input type="text" id="fabricante" placeholder="Ex: INDAIAL PAPEL EMBALAGENS LTDA - Matriz" />

      <label>Endereço</label>
      <input type="text" id="endereco" placeholder="Ex: Rua Dr. Blumenau 10101 - ENCANO" />

      <label>Cidade</label>
      <input type="text" id="cidade" placeholder="Ex: Indaial - SC" />

      <label>CNPJ</label>
      <input type="text" id="cnpj" placeholder="Ex: 78.534.674/0001-63" />

      <label>Validade</label>
      <input type="text" id="validade" placeholder="Ex: Indeterminada" />

      <div class="section-title">🖨️ Impressão</div>

      <label>Quantidade de Cópias</label>
      <input type="number" id="copias" min="1" value="1" />

      <div class="button-group">
        <button class="btn-gerar"    onclick="gerarZPL()">⚙️ Gerar ZPL</button>
        <button class="btn-preview"  onclick="atualizarPreview()">👁️ Visualizar</button>
        <button class="btn-copiar"   onclick="copiarZPL()">📋 Copiar ZPL</button>
        <button class="btn-download" onclick="baixarZPL()">💾 Baixar .zpl</button>
      </div>

      <label>Resultado ZPL</label>
      <textarea id="saidaZPL" readonly placeholder="O código ZPL aparecerá aqui após clicar em Gerar ZPL..."></textarea>
    </div>

    <!-- PREVIEW -->
    <div class="preview-panel">
      <h3>🖼️ Pré-visualização da Etiqueta</h3>
      <div id="previewImg">
        <div id="previewPlaceholder">Clique em <strong>Visualizar</strong><br>para ver a etiqueta aqui</div>
      </div>
      <div id="previewStatus"></div>
      <div style="font-size:11px;color:#bbb;text-align:center;margin-top:8px;">
        Powered by <a href="https://labelary.com" target="_blank" style="color:#bbb;">Labelary API</a>
      </div>
    </div>
  </div>

  <script>
    // ─── Centralização via ^FB (Field Block) ───────────────────────────────────
    // ^FB<width>,<maxLines>,<lineSpacing>,<justification>
    // J = center, L = left, R = right
    // Usamos largura total da etiqueta (812 dots) menos margem

    const LABEL_W = 812;   // dots (10cm @ 203dpi ≈ 812)
    const LABEL_H = 1218;  // dots (15cm @ 203dpi ≈ 1218)

    function buildZPL(copias) {
      const nomeProduto      = document.getElementById("nomeProduto").value.trim();
      const nomeLinha        = document.getElementById("nomeLinha").value.trim();
      const codigoEAN        = document.getElementById("codigoEAN").value.trim();
      const descricaoTecnica = document.getElementById("descricaoTecnica").value.split('\n');
      const fabricante       = document.getElementById("fabricante").value.trim();
      const endereco         = document.getElementById("endereco").value.trim();
      const cidade           = document.getElementById("cidade").value.trim();
      const cnpj             = document.getElementById("cnpj").value.trim();
      const validade         = document.getElementById("validade").value.trim();
      const tamanhoFonte     = parseInt(document.getElementById("tamanhoFonteTitulo").value) || 45;
      const posicaoY         = parseInt(document.getElementById("posicaoYTitulo").value) || 40;

      // Linhas de descrição (até 5)
      const d = [];
      for (let i = 0; i < 5; i++) d.push((descricaoTecnica[i] || '').trim());

      // Calcula posições dinâmicas baseadas no tamanho do título
      const tituloAltura = tamanhoFonte * 3 + 10;  // 3 linhas máx + espaço
      const kitY         = posicaoY + tituloAltura;
      const bcY          = kitY + 60;
      const bcAltura     = 160 + 50;               // altura barra + número
      const boxY         = bcY + bcAltura + 20;
      const infoBaseY    = boxY + d.filter(l=>l).length * 40 + 60;

      // Bloco de descrição centralizado com ^FB
      const descBlock = d.filter(l => l).map((linha, i) => {
        const y = boxY + 20 + i * 40;
        return `^FO50,${y}^FB712,1,0,C^FD${linha}^FS`;
      }).join('\n');

      const etiqueta = `^XA
^PW${LABEL_W}
^LL${LABEL_H}
^CI28

^CF0,${tamanhoFonte}
^FO50,${posicaoY}^FB712,3,5,C^FD${nomeProduto}^FS

^CF0,40
^FO50,${posicaoY + tamanhoFonte * 3 + 10}^FB712,1,0,C^FD${nomeLinha}^FS

^BY3,2,180
^FO120,${posicaoY + tamanhoFonte * 3 + 60}^BCN,160,Y,N^FD${codigoEAN}^FS

^FO45,${boxY}^GB722,${d.filter(l=>l).length * 40 + 40},3^FS
^CF0,30
${descBlock}

^CF0,28
^FO50,${infoBaseY}^FDFabricado por:^FS
^FO50,${infoBaseY + 35}^FD${fabricante}^FS
^FO50,${infoBaseY + 70}^FD${endereco}^FS
^FO50,${infoBaseY + 105}^FD${cidade}^FS
^FO50,${infoBaseY + 140}^FDCNPJ: ${cnpj}^FS
^FO50,${infoBaseY + 175}^FDIndústria Brasileira^FS
^FO50,${infoBaseY + 210}^FDManter em local seco e arejado.^FS
^FO50,${infoBaseY + 245}^FDProduto não perecível.^FS
^FO50,${infoBaseY + 280}^FDValidade: ${validade}^FS

^XZ`;

      let resultado = '';
      for (let i = 0; i < copias; i++) resultado += etiqueta + '\n\n';
      return resultado.trim();
    }

    function gerarZPL() {
      const copias = parseInt(document.getElementById("copias").value) || 1;
      const zpl = buildZPL(copias);
      document.getElementById("saidaZPL").value = zpl;
    }

    function copiarZPL() {
      const zpl = document.getElementById("saidaZPL");
      if (!zpl.value) { alert("Gere o ZPL primeiro!"); return; }
      zpl.select();
      zpl.setSelectionRange(0, 99999);
      document.execCommand("copy");
      alert("✅ ZPL copiado para a área de transferência!");
    }

    function baixarZPL() {
      const zpl = document.getElementById("saidaZPL").value;
      if (!zpl) { alert("Gere o ZPL primeiro!"); return; }
      const nome = (document.getElementById("nomeProduto").value.trim() || "etiqueta")
                    .replace(/[^a-zA-Z0-9_\-]/g, '_');
      const blob = new Blob([zpl], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = nome + '.zpl';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    async function atualizarPreview() {
      const status = document.getElementById("previewStatus");
      const container = document.getElementById("previewImg");

      // Gera ZPL de 1 cópia para preview
      const zpl = buildZPL(1);
      document.getElementById("saidaZPL").value = buildZPL(
        parseInt(document.getElementById("copias").value) || 1
      );

      status.textContent = "⏳ Carregando preview...";
      container.innerHTML = '';

      try {
        // Labelary API: /v1/printers/{dpmm}/labels/{width}x{height}/{index}/
        // 8dpmm = 203dpi, label 4x6 inches (≈ 10x15cm)
        const response = await fetch(
          'https://api.labelary.com/v1/printers/8dpmm/labels/4x6/0/',
          {
            method: 'POST',
            headers: { 'Accept': 'image/png', 'Content-Type': 'application/x-www-form-urlencoded' },
            body: zpl
          }
        );

        if (!response.ok) throw new Error(`Erro ${response.status}`);

        const blob = await response.blob();
        const url  = URL.createObjectURL(blob);
        const img  = document.createElement('img');
        img.src = url;
        img.alt = 'Preview da etiqueta';
        container.appendChild(img);
        status.textContent = "✅ Preview atualizado";
      } catch (err) {
        container.innerHTML = `<div id="previewPlaceholder" style="color:#c00;">
          ❌ Não foi possível carregar o preview.<br>
          <small>Verifique sua conexão ou acesse<br>
          <a href="https://labelary.com/viewer.html" target="_blank">labelary.com/viewer.html</a></small>
        </div>`;
        status.textContent = "Erro: " + err.message;
      }
    }
  </script>
</body>
</html>
